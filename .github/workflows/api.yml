name: Portfolio API

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  
jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore ./Portfolio.slnx

      - name: Build
        run: dotnet build ./Portfolio.slnx --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test ./tests/UnitTests/Portfolio.UnitTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Integrated tests
        run: dotnet test ./tests/IntegratedTests/Portfolio.IntegratedTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Functional tests
        run: dotnet test ./tests/FunctionalTests/Portfolio.FunctionalTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"
        env:
          ASPNETCORE_ENVIRONMENT: Testing

      - name: Publish
        run: dotnet publish ./src/WebAPI/Portfolio.Api/Portfolio.Api.csproj -c Release -o "$GITHUB_WORKSPACE/publish" --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ${{ github.workspace }}/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build-test-publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'portfolio-api-mathszoke'
          package: ./publish
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_API }}
