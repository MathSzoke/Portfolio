        $(function() {
            $("#slider-horizontal").slider({
                orientation: "horizontal",
                min: 0,
                max: 360,
                value: 0,

                    document.documentElement.style.setProperty('--skin-color', 'hsl(' + ui.value + ', 100%, 50%)');
                }
            });
        });
      </script>
